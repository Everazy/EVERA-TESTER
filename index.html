  PETUNJUK PEMASANGAN:

<!-- Modal Checkout QRIS Sakurupiah -->
<div id="modal-qris" class="fixed inset-0 z-[200] flex items-end justify-center p-4 pb-6" style="display:none!important">
  <!-- Backdrop -->
  <div id="qris-backdrop" onclick="tutupModalQRIS()"
       class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

  <!-- Panel -->
  <div class="relative w-full max-w-md bg-white rounded-[2rem] shadow-2xl overflow-hidden"
       style="animation: slideUp 0.3s ease">
    <!-- Handle bar -->
    <div class="flex justify-center pt-3 pb-1">
      <div class="w-10 h-1 bg-slate-200 rounded-full"></div>
    </div>

    <!-- Header -->
    <div class="px-6 pt-3 pb-4 border-b border-slate-100 flex items-center justify-between">
      <div>
        <p class="font-extrabold text-slate-900 text-base">Bayar via QRIS</p>
        <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-widest">Sakurupiah Payment</p>
      </div>
      <button onclick="tutupModalQRIS()"
              class="w-8 h-8 rounded-xl bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200 transition-colors">
        <i class="fas fa-times text-xs"></i>
      </button>
    </div>

    <!-- Isi form -->
    <div class="px-6 py-5 space-y-4">

      <!-- Ringkasan produk -->
      <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center text-lg flex-shrink-0"
             id="qris-produk-icon">🛒</div>
        <div class="flex-1 min-w-0">
          <p class="font-extrabold text-slate-800 text-sm leading-tight truncate" id="qris-produk-nama">—</p>
          <p class="text-[10px] text-slate-500 font-semibold" id="qris-produk-detail">—</p>
        </div>
        <div class="flex-shrink-0 text-right">
          <p class="font-extrabold text-indigo-600 text-base" id="qris-produk-harga">—</p>
        </div>
      </div>

      <!-- Field ID Game / Akun (muncul hanya jika relevan) -->
      <div id="qris-field-gameid" style="display:none">
        <label class="block text-[11px] font-black text-slate-500 uppercase tracking-wider mb-1.5">
          ID Game / Akun <span class="text-rose-400">*</span>
        </label>
        <input id="qris-gameid" type="text" placeholder="Contoh: 123456789 (Server: 1234)"
               class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold text-slate-800 outline-none focus:border-indigo-400 transition-colors placeholder:text-slate-300">
      </div>

      <!-- Nomor WhatsApp -->
      <div>
        <label class="block text-[11px] font-black text-slate-500 uppercase tracking-wider mb-1.5">
          Nomor WhatsApp <span class="text-rose-400">*</span>
        </label>
        <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:border-indigo-400 transition-colors">
          <span class="text-sm font-black text-slate-400">🇮🇩 +62</span>
          <div class="w-px h-5 bg-slate-200"></div>
          <input id="qris-phone" type="tel" placeholder="812xxxxxxxx"
                 class="flex-1 bg-transparent text-sm font-semibold text-slate-800 outline-none placeholder:text-slate-300">
        </div>
        <p class="text-[10px] text-slate-400 font-medium mt-1.5">
          Notifikasi & konfirmasi pesanan akan dikirim ke nomor ini
        </p>
      </div>

      <!-- Catatan (opsional) -->
      <div>
        <label class="block text-[11px] font-black text-slate-500 uppercase tracking-wider mb-1.5">
          Catatan <span class="text-slate-300 font-medium">(opsional)</span>
        </label>
        <input id="qris-catatan" type="text" placeholder="Catatan tambahan untuk admin..."
               class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold text-slate-800 outline-none focus:border-indigo-400 transition-colors placeholder:text-slate-300">
      </div>

      <!-- Pesan error -->
      <div id="qris-error"
           class="hidden bg-rose-50 border border-rose-200 rounded-xl px-4 py-3 text-sm font-semibold text-rose-600">
      </div>

      <!-- Tombol Bayar -->
      <button id="qris-btn-bayar" onclick="prosesQRIS()"
              class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-extrabold text-sm rounded-2xl transition-all duration-150 flex items-center justify-center gap-2">
        <span id="qris-btn-text" class="flex items-center gap-2">
          <i class="fas fa-qrcode"></i>
          Bayar Sekarang
        </span>
        <span id="qris-btn-loading" class="hidden">
          <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"/>
          </svg>
          Memproses...
        </span>
      </button>

      <!-- Trust note -->
      <div class="flex items-center justify-center gap-4 pt-1">
        <div class="flex items-center gap-1.5 text-[10px] text-slate-400 font-semibold">
          <i class="fas fa-lock text-emerald-400"></i> Pembayaran Aman
        </div>
        <div class="flex items-center gap-1.5 text-[10px] text-slate-400 font-semibold">
          <i class="fas fa-bolt text-amber-400"></i> Proses Cepat
        </div>
        <div class="flex items-center gap-1.5 text-[10px] text-slate-400 font-semibold">
          <i class="fab fa-whatsapp text-emerald-400"></i> Support 24 Jam
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  /* Dark mode support - otomatis ikut dark mode Everastore */
  body.dark #modal-qris > div:last-child,
  body.dark #modal-qris .bg-white {
    background-color: #1e293b !important;
    color: #f8fafc !important;
  }
  body.dark #modal-qris .bg-slate-50,
  body.dark #modal-qris input {
    background-color: #334155 !important;
    border-color: #475569 !important;
    color: #f8fafc !important;
  }
  body.dark #modal-qris .border-slate-100,
  body.dark #modal-qris .border-slate-200 {
    border-color: #334155 !important;
  }
  body.dark #modal-qris .text-slate-400,
  body.dark #modal-qris .text-slate-500,
  body.dark #modal-qris .text-slate-800,
  body.dark #modal-qris .text-slate-900 {
    color: #cbd5e1 !important;
  }
  body.dark #modal-qris .bg-indigo-50 {
    background-color: rgba(79,70,229,0.18) !important;
    border-color: rgba(79,70,229,0.3) !important;
  }
  body.dark #modal-qris .bg-slate-100,
  body.dark #modal-qris .hover\:bg-slate-200:hover {
    background-color: #334155 !important;
  }
</style>

<script>
// ─── State global untuk QRIS modal ───────────────────────────
window._qrisProduk = {};

// ─── Buka modal QRIS ─────────────────────────────────────────
// Dipanggil dari tombol "Bayar QRIS" yang ditambahkan di tiap produk
function bukaMODALqris(data) {
  window._qrisProduk = data;

  // Isi ringkasan produk
  document.getElementById("qris-produk-icon").textContent  = data.icon  || "🛒";
  document.getElementById("qris-produk-nama").textContent  = data.nama  || "—";
  document.getElementById("qris-produk-detail").textContent = data.detail || data.kategori || "—";
  document.getElementById("qris-produk-harga").textContent =
    "Rp " + Number(data.harga || 0).toLocaleString("id-ID");

  // Tampilkan field ID Game hanya untuk kategori Game
  const isGame = (data.kategori || "").toLowerCase().includes("game") ||
                 (data.nama || "").toLowerCase().includes("mobile legends") ||
                 (data.nama || "").toLowerCase().includes("free fire") ||
                 (data.nama || "").toLowerCase().includes("pubg") ||
                 (data.tipe || "") === "game";
  document.getElementById("qris-field-gameid").style.display = isGame ? "block" : "none";

  // Reset form
  document.getElementById("qris-phone").value   = "";
  document.getElementById("qris-gameid").value  = "";
  document.getElementById("qris-catatan").value = "";
  sembunyikanError();
  setBtnBayarLoading(false);

  // Tampilkan modal
  const modal = document.getElementById("modal-qris");
  modal.style.display = "flex";
  modal.style.removeProperty("display");
  // Cegah scroll body
  document.body.classList.add("modal-open");
}

function tutupModalQRIS() {
  const modal = document.getElementById("modal-qris");
  modal.style.display = "none";
  document.body.classList.remove("modal-open");
}

function tampilkanError(pesan) {
  const el = document.getElementById("qris-error");
  el.textContent = pesan;
  el.classList.remove("hidden");
}

function sembunyikanError() {
  document.getElementById("qris-error").classList.add("hidden");
}

function setBtnBayarLoading(loading) {
  const btn   = document.getElementById("qris-btn-bayar");
  const text  = document.getElementById("qris-btn-text");
  const spin  = document.getElementById("qris-btn-loading");
  btn.disabled     = loading;
  text.classList.toggle("hidden", loading);
  spin.classList.toggle("hidden", !loading);
}

// ─── Proses pembayaran ke backend ────────────────────────────
async function prosesQRIS() {
  sembunyikanError();

  const phone   = document.getElementById("qris-phone").value.trim();
  const gameId  = document.getElementById("qris-gameid").value.trim();
  const catatan = document.getElementById("qris-catatan").value.trim();
  const produk  = window._qrisProduk;

  // Validasi client-side
  if (!phone) {
    return tampilkanError("Nomor WhatsApp wajib diisi.");
  }
  if (!/^[0-9]{8,14}$/.test(phone.replace(/^0/, "").replace(/^62/, ""))) {
    return tampilkanError("Format nomor WhatsApp tidak valid.");
  }
  const isGame = document.getElementById("qris-field-gameid").style.display !== "none";
  if (isGame && !gameId) {
    return tampilkanError("ID Game wajib diisi untuk produk ini.");
  }

  setBtnBayarLoading(true);

  try {
    const resp = await fetch("/api/payments/create", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({
        namaProduk: produk.nama  || produk.name || "Produk Everastore",
        harga:      produk.harga || produk.price || 0,
        phone,
        gameId,
        catatan,
      }),
    });

    const data = await resp.json();

    if (data.ok && data.checkout_url) {
      // Redirect ke halaman pembayaran Sakurupiah
      window.location.href = data.checkout_url;
    } else {
      tampilkanError(data.message || "Gagal membuat invoice. Coba lagi.");
      setBtnBayarLoading(false);
    }
  } catch (err) {
    console.error("QRIS Error:", err);
    tampilkanError("Gagal terhubung ke server. Periksa koneksi kamu.");
    setBtnBayarLoading(false);
  }
}

// ─── Inject tombol "Bayar QRIS" ke modal produk Everastore ───
// Fungsi ini memantau kapan modal produk dibuka, lalu menambahkan
// tombol QRIS di sebelah tombol WA yang sudah ada.
(function injectQRISButton() {
  // Observer untuk memantau perubahan DOM (saat modal produk dibuka)
  const observer = new MutationObserver(() => {
    // Cari tombol konfirmasi WA yang sudah ada di modal produk Everastore
    // Selector ini menyesuaikan dengan struktur HTML index.html kamu
    const waButtons = document.querySelectorAll(
      "#modal-checkout .btn-wa-confirm, " +           // kemungkinan class 1
      "#modal-checkout [onclick*='konfirmasi'], " +   // kemungkinan onclick WA
      "#modal-checkout [onclick*='whatsapp'], " +     // kemungkinan onclick WA
      "#modal-checkout [onclick*='wa.me']"            // link WA langsung
    );

    waButtons.forEach((btn) => {
      // Cegah duplikasi
      if (btn.dataset.qrisInjected) return;
      btn.dataset.qrisInjected = "true";

      // Ambil data produk dari konteks modal (disesuaikan dengan variabel global Everastore)
      const produkData = window.selectedProduct || window._currentProduk || {};

      // Buat tombol QRIS
      const qrisBtn = document.createElement("button");
      qrisBtn.className = [
        "w-full mt-2 py-3.5 rounded-2xl font-extrabold text-sm",
        "bg-indigo-600 hover:bg-indigo-700 active:scale-95",
        "text-white transition-all duration-150",
        "flex items-center justify-center gap-2"
      ].join(" ");
      qrisBtn.innerHTML = `<i class="fas fa-qrcode"></i> Bayar via QRIS`;
      qrisBtn.onclick = (e) => {
        e.stopPropagation();
        // Tutup modal produk dulu
        const closeBtn = document.querySelector("#modal-checkout [onclick*='close'], #modal-checkout [onclick*='tutup']");
        if (closeBtn) closeBtn.click();
        // Buka modal QRIS
        bukaMODALqris(produkData);
      };

      btn.parentNode.insertBefore(qrisBtn, btn.nextSibling);
    });
  });

  observer.observe(document.body, { childList: true, subtree: true });

  // ── Cara alternatif yang lebih andal ──────────────────────
  // Karena struktur modal Everastore bisa bervariasi, kita juga
  // tambahkan tombol QRIS di card produk langsung (di grid produk).
  // Caranya: override fungsi openProduct / showProduct jika ada.
  const _origOpen = window.openProduct || window.showProduct || null;

  function patchProductOpener(fnName) {
    const origFn = window[fnName];
    if (typeof origFn !== "function") return;
    window[fnName] = function(...args) {
      origFn.apply(this, args);
      // Setelah modal terbuka, simpan data produk ke window global
      // agar bisa diambil saat tombol QRIS ditekan
      setTimeout(() => {
        // Coba ambil dari variabel global yang biasa dipakai Everastore
        const p = window.selectedProduct || window.currentProduk || window._selectedProduk || {};
        window._qrisPendingProduk = p;
      }, 100);
    };
  }

  // Patch setelah DOM siap
  window.addEventListener("load", () => {
    ["openProduct", "showProduct", "openModal", "showModal", "tampilProduk"].forEach(patchProductOpener);
  });
})();

// ─── Tambah tombol QRIS langsung di card produk (fallback) ───
// Jika inject via observer tidak berhasil, gunakan ini.
// Panggil fungsi ini setelah produk selesai dirender ke DOM.
window.tambahTombolQRIS = function(produkData, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const existing = container.querySelector(".btn-qris-inject");
  if (existing) return; // Sudah ada

  const btn = document.createElement("button");
  btn.className = [
    "btn-qris-inject w-full mt-2 py-3 rounded-2xl font-extrabold text-sm",
    "bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white",
    "transition-all duration-150 flex items-center justify-center gap-2"
  ].join(" ");
  btn.innerHTML = `<i class="fas fa-qrcode"></i> Bayar via QRIS`;
  btn.onclick = () => bukaMODALqris(produkData);
  container.appendChild(btn);
};

// ─── Tangkap ESC untuk tutup modal ───────────────────────────
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") tutupModalQRIS();
});
</script>
