<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Admin Panel - Everastore</title>
  <link rel="icon" type="image/jpeg" href="/EVERASTORE.jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
    .fu { animation: fadeUp 0.25s ease forwards; }
    .tab-active { background:#4f46e5!important; color:#fff!important; box-shadow:0 4px 12px rgba(79,70,229,.25); }
    .inp { background:#f8fafc; border:1px solid #e2e8f0; color:#0f172a; outline:none; transition:border-color .15s; }
    .inp:focus { border-color:#4f46e5; }
    textarea.inp { resize:vertical; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

<!-- Nav -->
<nav class="bg-white border-b sticky top-0 z-50 px-4 py-3">
  <div class="max-w-5xl mx-auto flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-2">
        <img src="/EVERASTORE.jpeg" class="w-7 h-7 rounded-lg object-cover" onerror="this.style.display='none'">
        <span class="font-extrabold text-indigo-600 text-base uppercase tracking-tighter">Everastore</span>
      </a>
      <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-indigo-50 text-indigo-500 px-2.5 py-1 rounded-lg">Admin Panel</span>
    </div>
    <button onclick="logout()" class="text-[11px] font-bold text-slate-400 hover:text-rose-500 transition-colors flex items-center gap-1.5">
      <i class="fas fa-sign-out-alt"></i> Keluar
    </button>
  </div>
</nav>

<!-- LOGIN -->
<div id="screen-login" class="flex-1 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-indigo-600 flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-lock text-white text-2xl"></i>
      </div>
      <h1 class="font-extrabold text-2xl text-slate-900">Login Admin</h1>
      <p class="text-sm text-slate-500 mt-1">Akses panel kelola stok & orders</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <div class="mb-4">
        <label class="block text-[11px] font-black text-slate-500 uppercase tracking-wider mb-2">Email</label>
        <input id="l-email" type="email" placeholder="admin@everastore.biz.id" class="inp w-full px-4 py-3 rounded-xl text-sm font-semibold">
      </div>
      <div class="mb-5">
        <label class="block text-[11px] font-black text-slate-500 uppercase tracking-wider mb-2">Password</label>
        <input id="l-pass" type="password" placeholder="••••••••" class="inp w-full px-4 py-3 rounded-xl text-sm font-semibold" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="l-error" class="hidden bg-rose-50 border border-rose-200 text-rose-600 text-xs font-semibold rounded-xl px-4 py-3 mb-4"></div>
      <button onclick="doLogin()" id="l-btn" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-extrabold text-sm rounded-xl transition-all">
        Masuk ke Panel Admin
      </button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dash" class="hidden flex-1 flex flex-col">
  <div class="max-w-5xl mx-auto w-full px-4 py-5 flex-1">

    <!-- Tabs -->
    <div class="flex gap-2 mb-5 bg-white border border-slate-200 rounded-2xl p-1.5 shadow-sm">
      <button class="tab-active flex-1 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider transition-all" id="tab-stok" onclick="gotoTab('stok')">
        <i class="fas fa-boxes mr-1"></i> Stok Akun
      </button>
      <button class="flex-1 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider transition-all text-slate-500 hover:bg-slate-50" id="tab-orders" onclick="gotoTab('orders')">
        <i class="fas fa-receipt mr-1"></i> Orders
      </button>
    </div>

    <!-- ── PANEL STOK ── -->
    <div id="panel-stok">
      <!-- Form tambah -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm mb-4">
        <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4"><i class="fas fa-plus-circle text-indigo-400 mr-1"></i>Tambah Stok Akun</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-[11px] font-black text-slate-500 uppercase tracking-wider mb-1.5">Kode Produk <span class="text-rose-400">*</span></label>
            <input id="s-kode" type="text" placeholder="Contoh: #CC1 atau #ML86" class="inp w-full px-4 py-3 rounded-xl text-sm font-semibold font-mono">
            <p class="text-[10px] text-slate-400 mt-1">Harus sama persis dengan kode di produk</p>
          </div>
          <div>
            <label class="block text-[11px] font-black text-slate-500 uppercase tracking-wider mb-1.5">Nama Produk</label>
            <input id="s-nama" type="text" placeholder="Contoh: CapCut Premium 7 Hari" class="inp w-full px-4 py-3 rounded-xl text-sm font-semibold">
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-[11px] font-black text-slate-500 uppercase tracking-wider mb-1.5">
            Daftar Akun <span class="text-rose-400">*</span>
            <span class="font-normal text-slate-400 normal-case ml-1">— 1 akun per baris, format bebas (contoh: email|password)</span>
          </label>
          <textarea id="s-akun" rows="7" placeholder="user1@gmail.com|password123&#10;user2@gmail.com|password456&#10;user3@gmail.com|password789" class="inp w-full px-4 py-3 rounded-xl text-sm font-mono font-semibold"></textarea>
        </div>
        <div id="s-error"   class="hidden bg-rose-50 border border-rose-200 text-rose-600 text-xs font-semibold rounded-xl px-4 py-3 mb-3"></div>
        <div id="s-success" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs font-semibold rounded-xl px-4 py-3 mb-3"></div>
        <button onclick="tambahStok()" id="s-btn" class="py-3 px-6 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-extrabold text-sm rounded-xl transition-all">
          <i class="fas fa-plus mr-1"></i>Tambah ke Stok
        </button>
      </div>

      <!-- Daftar stok -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest"><i class="fas fa-list text-slate-300 mr-1"></i>Semua Stok</p>
          <button onclick="muatStok()" class="text-[10px] font-black text-indigo-500 hover:text-indigo-700 uppercase tracking-wider"><i class="fas fa-sync-alt mr-1"></i>Refresh</button>
        </div>
        <div id="stok-list"><p class="text-sm text-slate-400 font-semibold text-center py-8">Memuat stok...</p></div>
      </div>
    </div>

    <!-- ── PANEL ORDERS ── -->
    <div id="panel-orders" class="hidden">
      <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest"><i class="fas fa-receipt text-slate-300 mr-1"></i>Semua Order</p>
          <button onclick="muatOrders()" class="text-[10px] font-black text-indigo-500 hover:text-indigo-700 uppercase tracking-wider"><i class="fas fa-sync-alt mr-1"></i>Refresh</button>
        </div>
        <!-- Filter status -->
        <div class="flex gap-2 mb-4 flex-wrap">
          <button onclick="setFilter('semua',this)"  class="filter-btn text-[10px] font-black px-3 py-1.5 rounded-lg bg-indigo-600 text-white">Semua</button>
          <button onclick="setFilter('pending',this)"     class="filter-btn text-[10px] font-black px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600">Pending</button>
          <button onclick="setFilter('sukses',this)"      class="filter-btn text-[10px] font-black px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600">Sukses</button>
          <button onclick="setFilter('stok_habis',this)"  class="filter-btn text-[10px] font-black px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600">Stok Habis</button>
          <button onclick="setFilter('expired',this)"     class="filter-btn text-[10px] font-black px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600">Expired</button>
        </div>
        <div id="orders-list"><p class="text-sm text-slate-400 font-semibold text-center py-8">Memuat orders...</p></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL DELIVER MANUAL -->
<div id="modal-deliver" class="hidden fixed inset-0 z-50 flex items-end justify-center p-4 pb-6">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="tutupDeliver()"></div>
  <div class="relative w-full max-w-md bg-white rounded-[2rem] p-6 shadow-2xl">
    <h3 class="font-extrabold text-base text-slate-900 mb-0.5">Deliver Manual</h3>
    <p class="text-xs text-slate-500 font-semibold mb-4" id="deliver-label">—</p>
    <label class="block text-[11px] font-black text-slate-500 uppercase tracking-wider mb-1.5">Isi Akun yang Akan Dikirim</label>
    <textarea id="deliver-akun" rows="4" placeholder="email|password atau format lain..." class="inp w-full px-4 py-3 rounded-xl text-sm font-mono font-semibold mb-4"></textarea>
    <div class="flex gap-3">
      <button onclick="tutupDeliver()" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-extrabold text-sm rounded-xl transition-all">Batal</button>
      <button onclick="kirimDeliver()" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-sm rounded-xl transition-all">Kirim Akun</button>
    </div>
  </div>
</div>

<script>
  let token       = localStorage.getItem("eva_tok") || "";
  let allOrders   = [];
  let filterStatus = "semua";
  let deliverRef  = "";

  // ── Login ──────────────────────────────────────────────────
  async function doLogin() {
    const email = document.getElementById("l-email").value.trim();
    const pass  = document.getElementById("l-pass").value;
    const errEl = document.getElementById("l-error");
    const btn   = document.getElementById("l-btn");
    errEl.classList.add("hidden");
    btn.disabled = true; btn.textContent = "Memproses...";
    try {
      const resp = await fetch("/api/admin/login", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email, password: pass }),
      });
      const data = await resp.json();
      if (data.ok) {
        token = data.token || "admin";
        localStorage.setItem("eva_tok", token);
        masukDash();
      } else {
        errEl.textContent = data.message || "Login gagal";
        errEl.classList.remove("hidden");
      }
    } catch { errEl.textContent = "Gagal terhubung ke server"; errEl.classList.remove("hidden"); }
    btn.disabled = false; btn.textContent = "Masuk ke Panel Admin";
  }

  function masukDash() {
    document.getElementById("screen-login").classList.add("hidden");
    document.getElementById("screen-dash").classList.remove("hidden");
    muatStok();
  }

  function logout() {
    localStorage.removeItem("eva_tok"); token = "";
    document.getElementById("screen-login").classList.remove("hidden");
    document.getElementById("screen-dash").classList.add("hidden");
  }

  if (token) masukDash();

  // ── Tabs ──────────────────────────────────────────────────
  function gotoTab(t) {
    ["stok","orders"].forEach(n => {
      document.getElementById(`panel-${n}`).classList.toggle("hidden", n !== t);
      const btn = document.getElementById(`tab-${n}`);
      if (n === t) { btn.classList.add("tab-active"); btn.classList.remove("text-slate-500"); }
      else         { btn.classList.remove("tab-active"); btn.classList.add("text-slate-500"); }
    });
    if (t === "orders") muatOrders();
  }

  function ah() { return { "Content-Type":"application/json", "x-admin-token": token }; }

  // ── Stok ──────────────────────────────────────────────────
  async function muatStok() {
    const el = document.getElementById("stok-list");
    el.innerHTML = '<p class="text-sm text-slate-400 font-semibold text-center py-8">Memuat...</p>';
    try {
      const resp = await fetch("/api/stok", { headers: ah() });
      if (resp.status === 401) { logout(); return; }
      const { data } = await resp.json();
      const keys = Object.keys(data || {});
      if (!keys.length) { el.innerHTML = '<p class="text-sm text-slate-400 font-semibold text-center py-8">Belum ada stok. Tambahkan di atas.</p>'; return; }
      el.innerHTML = keys.map(kode => {
        const entry = data[kode];
        const jml   = entry.akun?.length || 0;
        const badge = jml === 0
          ? `<span class="bg-rose-50 text-rose-600 text-[10px] font-black px-2 py-0.5 rounded-lg">HABIS</span>`
          : jml <= 3
          ? `<span class="bg-amber-50 text-amber-600 text-[10px] font-black px-2 py-0.5 rounded-lg">${jml} akun ⚡</span>`
          : `<span class="bg-emerald-50 text-emerald-600 text-[10px] font-black px-2 py-0.5 rounded-lg">${jml} akun ✅</span>`;
        const items = (entry.akun||[]).map((a,i) => `
          <div class="flex items-center gap-2 py-1.5 border-b border-slate-50 last:border-0">
            <span class="text-[10px] text-slate-400 font-black w-5 flex-shrink-0">${i+1}</span>
            <span class="font-mono text-xs text-slate-600 font-semibold flex-1 truncate">${a}</span>
            <button onclick="hapusAkun('${kode}',${JSON.stringify(a)})" class="text-[10px] text-rose-400 hover:text-rose-600 font-black px-1.5 py-1 rounded hover:bg-rose-50 transition-colors flex-shrink-0"><i class="fas fa-trash"></i></button>
          </div>`).join("");
        return `
          <div class="border border-slate-100 rounded-xl mb-3 overflow-hidden fu">
            <div class="flex items-center justify-between gap-2 p-3 bg-slate-50">
              <div class="flex items-center gap-2 min-w-0">
                <span class="font-mono font-black text-indigo-600 text-sm flex-shrink-0">${kode}</span>
                <span class="text-sm font-semibold text-slate-600 truncate">${entry.namaProduk||""}</span>
              </div>
              <div class="flex items-center gap-2 flex-shrink-0">
                ${badge}
                <button onclick="kosongkan('${kode}')" class="text-[10px] text-slate-400 hover:text-rose-500 font-black px-1.5 py-1 rounded hover:bg-rose-50 transition-colors"><i class="fas fa-trash-alt"></i></button>
              </div>
            </div>
            ${jml > 0 ? `<div class="px-4 py-2 max-h-40 overflow-y-auto">${items}</div>` : ""}
          </div>`;
      }).join("");
    } catch { el.innerHTML = '<p class="text-sm text-rose-400 font-semibold text-center py-8">Gagal memuat stok.</p>'; }
  }

  async function tambahStok() {
    const kode = document.getElementById("s-kode").value.trim();
    const nama = document.getElementById("s-nama").value.trim();
    const raw  = document.getElementById("s-akun").value.trim();
    const errEl = document.getElementById("s-error");
    const okEl  = document.getElementById("s-success");
    errEl.classList.add("hidden"); okEl.classList.add("hidden");
    if (!kode) { errEl.textContent="Kode produk wajib diisi"; errEl.classList.remove("hidden"); return; }
    if (!raw)  { errEl.textContent="Akun wajib diisi";        errEl.classList.remove("hidden"); return; }
    const akun = raw.split("\n").map(s=>s.trim()).filter(Boolean);
    const btn  = document.getElementById("s-btn");
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Menyimpan...';
    try {
      const resp = await fetch("/api/stok/tambah", { method:"POST", headers:ah(), body:JSON.stringify({ kode, namaProduk:nama, akun }) });
      const data = await resp.json();
      if (data.ok) {
        okEl.textContent = `✅ ${data.message} — Total stok: ${data.jumlah} akun`;
        okEl.classList.remove("hidden");
        document.getElementById("s-akun").value = "";
        muatStok();
      } else { errEl.textContent = data.message||"Gagal"; errEl.classList.remove("hidden"); }
    } catch { errEl.textContent="Gagal terhubung"; errEl.classList.remove("hidden"); }
    btn.disabled=false; btn.innerHTML='<i class="fas fa-plus mr-1"></i>Tambah ke Stok';
  }

  async function hapusAkun(kode, akun) {
    if (!confirm(`Hapus akun: ${akun}?`)) return;
    await fetch("/api/stok/hapus", { method:"DELETE", headers:ah(), body:JSON.stringify({kode,akun}) });
    muatStok();
  }

  async function kosongkan(kode) {
    if (!confirm(`Kosongkan SEMUA stok untuk ${kode}?`)) return;
    await fetch(`/api/stok/${encodeURIComponent(kode)}`, { method:"DELETE", headers:ah() });
    muatStok();
  }

  // ── Orders ────────────────────────────────────────────────
  function setFilter(s, el) {
    filterStatus = s;
    document.querySelectorAll(".filter-btn").forEach(b => { b.classList.remove("bg-indigo-600","text-white"); b.classList.add("bg-slate-100","text-slate-600"); });
    el.classList.add("bg-indigo-600","text-white"); el.classList.remove("bg-slate-100","text-slate-600");
    renderOrders();
  }

  async function muatOrders() {
    document.getElementById("orders-list").innerHTML = '<p class="text-sm text-slate-400 font-semibold text-center py-8">Memuat...</p>';
    try {
      const resp = await fetch("/api/orders", { headers:ah() });
      if (resp.status===401) { logout(); return; }
      const { data } = await resp.json();
      allOrders = data || [];
      renderOrders();
    } catch { document.getElementById("orders-list").innerHTML='<p class="text-sm text-rose-400 font-semibold text-center py-8">Gagal memuat.</p>'; }
  }

  function renderOrders() {
    const el   = document.getElementById("orders-list");
    const list = filterStatus==="semua" ? allOrders : allOrders.filter(o=>(o.status||"pending")===filterStatus);
    if (!list.length) { el.innerHTML='<p class="text-sm text-slate-400 font-semibold text-center py-8">Tidak ada order.</p>'; return; }

    const badgeMap = { pending:"bg-amber-50 text-amber-600", sukses:"bg-emerald-50 text-emerald-600", stok_habis:"bg-rose-50 text-rose-600", expired:"bg-slate-100 text-slate-500", sukses_manual:"bg-violet-50 text-violet-600" };
    el.innerHTML = list.map(o => {
      const st    = o.status||"pending";
      const badge = `<span class="${badgeMap[st]||"bg-slate-100 text-slate-500"} text-[10px] font-black px-2 py-0.5 rounded-lg">${st}</span>`;
      const tgl   = new Date(o.createdAt).toLocaleString("id-ID");
      const akunInfo = o.akunDikirim ? `<div class="mt-2 bg-emerald-50 border border-emerald-100 rounded-lg px-3 py-2"><p class="text-[10px] font-black text-emerald-500 uppercase tracking-wider mb-0.5">Akun Terkirim</p><p class="font-mono text-xs text-emerald-700 font-bold break-all">${o.akunDikirim}</p></div>` : "";
      const dlvrBtn  = (!o.delivered && st!=="expired") ? `<button onclick="bukaDeliver('${o.merchantRef}')" class="text-[10px] font-black text-indigo-500 hover:text-indigo-700 px-2 py-1 rounded hover:bg-indigo-50 transition-colors mt-1"><i class="fas fa-hand-holding mr-1"></i>Deliver Manual</button>` : "";
      return `
        <div class="border border-slate-100 rounded-xl p-4 mb-3 fu">
          <div class="flex items-start justify-between gap-2 mb-2">
            <div class="flex-1 min-w-0">
              <p class="font-bold text-slate-800 text-sm truncate">${o.namaProduk}</p>
              <p class="font-mono text-[10px] text-slate-400 font-semibold">${o.merchantRef}</p>
            </div>
            ${badge}
          </div>
          <div class="grid grid-cols-2 gap-x-4 text-[11px] text-slate-500 font-semibold">
            <span>📱 ${o.phone}</span>
            <span>💰 Rp ${Number(o.harga||0).toLocaleString("id-ID")}</span>
            <span>🔖 ${o.kodeProduk}</span>
            <span>🕐 ${tgl}</span>
          </div>
          ${akunInfo}${dlvrBtn}
        </div>`;
    }).join("");
  }

  // ── Deliver manual ────────────────────────────────────────
  function bukaDeliver(ref) {
    deliverRef = ref;
    document.getElementById("deliver-label").textContent = `Order: ${ref}`;
    document.getElementById("deliver-akun").value = "";
    document.getElementById("modal-deliver").classList.remove("hidden");
  }
  function tutupDeliver() { document.getElementById("modal-deliver").classList.add("hidden"); deliverRef=""; }
  async function kirimDeliver() {
    const akun = document.getElementById("deliver-akun").value.trim();
    if (!akun || !deliverRef) return;
    await fetch(`/api/orders/${deliverRef}/deliver`, { method:"POST", headers:ah(), body:JSON.stringify({akun}) });
    tutupDeliver(); muatOrders();
  }
</script>
</body>
</html>
